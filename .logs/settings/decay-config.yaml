# PMPilot Memory Decay Configuration
# Loaded by: pmpilot-core/skills/distill/scripts/apply-decay.sh + dream.md
# Updated: 2026-06-04 (v0.7)
#
# All decay parameters MUST come from this file. Hardcoded constants in
# distill skill or scripts are a bug — fix by reading from here.

version: "0.7"

# === Base rates by knowledge type (annual decay rate) ===
base_rate:
  foundation: 0.05  # 5%/year — architectural facts decay slowly
  convention: 0.08  # 8%/year — team rules might drift
  context:    0.15  # 15%/year — current work moves fast

# === Time factor (logarithmic decay) ===
# time_factor = log(1 + age_years) / log(2)
time_factor:
  formula: "log2(1 + age_years)"
  cap: 3.0  # cap at 3.0 (≈ 7 years) to avoid extreme decay

# === Usage factor (multiplier on decay) ===
# Lower = slower decay (well-used knowledge keeps confidence)
usage_factor:
  access_0:      2.0   # never accessed → accelerate decay
  access_1_2:    1.0   # rarely accessed → normal decay
  access_3_9:    0.5   # somewhat used → slow decay
  access_10_19:  0.3   # frequently used → much slower
  access_20_plus: 0.1  # heavily used → minimal decay

# === Per-run caps ===
max_decay_per_run: 0.10  # cap decay applied per single dream/apply-decay call
min_confidence:    0.05  # floor — never let confidence go below this

# === Grace period (FIX for v0.4 age=0 bug) ===
# Knowledge younger than this is exempt from decay calculations.
# This fixes the bug where new knowledge (age=0) got 0.10 confidence deducted.
grace_period_days: 30

# === High-access boost (counteract decay for well-used items) ===
boost:
  access_10_19: 0.02   # +2% confidence
  access_20_49: 0.05   # +5% confidence
  access_50_plus: 0.10 # +10% confidence
  max_confidence: 1.0  # cap

# === Recent accesses tracking (v0.7 new) ===
# Replace single `last_accessed` with array of last N timestamps.
# This enables decay/boost to consider access *recency distribution*, not just count.
recent_accesses:
  enabled: true
  max_kept: 10  # keep last 10 access timestamps
  # Future use: detect "burst access then silence" pattern → flag for review

# === Confidence thresholds → actions ===
thresholds:
  ok:              0.6   # confidence >= 0.6 → no action
  lower_priority:  0.4   # 0.4 <= conf < 0.6 → lower in load order
  needs_review:    0.2   # 0.2 <= conf < 0.4 → mark for manual verification
  archive_suggest: 0.0   # conf < 0.2 → suggest archive in next dream PR

# === TTL extension rules ===
ttl_extension:
  foundation:
    threshold_access: 10
    extend_days: 90
  convention:
    threshold_access: 5
    extend_days: 90
  context:
    threshold_status: active
    extend_days: 60

# === Anti-patterns to detect ===
warn_on:
  - "files modified within last 7 days with confidence dropping below 0.3"  # possible bug
  - "files with access_count > 20 and confidence < 0.5"                      # suspicious
  - "files with type=foundation and age > 730 days never verified"           # stale architecture
